# Production Configuration for Render Deployment

# Server Configuration (Render provides PORT)
server.port=${PORT}
server.servlet.context-path=/airtel-inventory

# Database Configuration (Render MySQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Thymeleaf Configuration (Cache enabled for production)
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML

# Logging Configuration
logging.level.root=WARN
logging.level.com.airtel.inventory=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# Security Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Performance Configuration
spring.mvc.async.request-timeout=30000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
